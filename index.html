<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agência Exittus – Conectando Talentos ao Futuro</title>
<meta http-equiv="refresh" content="6;url=https://agenciaexittus.github.io/agenciaexittus/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-900: #2d4a08;
    --green-700: #4F7214;
    --green-600: #5d8418;
    --green-500: #6d9a1c;
    --green-300: #a8c85a;
    --green-100: #e8f2d0;
    --green-50:  #f4f9eb;
    --ink-900: #0f1407;
    --ink-800: #1c2410;
    --ink-600: #3a4020;
    --ink-400: #6b7355;
    --ink-200: #b8bfa8;
    --ink-100: #e2e6d8;
    --ink-050: #f7f8f5;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Sora', sans-serif;
    background: var(--ink-900);
    color: var(--ink-050);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .bg-field {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 82% 18%, rgba(168,200,90,0.14) 0%, rgba(168,200,90,0) 42%),
      radial-gradient(circle at 10% 90%, rgba(93,132,24,0.18) 0%, rgba(93,132,24,0) 55%);
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    max-width: 900px;
    width: 100%;
  }
  .cover-frame {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.45), 0 0 0 1px rgba(232,242,208,0.08);
    line-height: 0;
  }
  .cover-frame img {
    width: 100%;
    height: auto;
    display: block;
  }
  .actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 34px;
    border-radius: 12px;
    background: var(--green-300);
    color: var(--ink-800);
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .cta:hover {
    background: var(--green-500);
    color: var(--green-50);
    transform: translateY(-2px);
  }
  .hint {
    font-size: 14px;
    color: var(--ink-200);
  }
  .hint a { color: var(--green-300); text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
  .nav-pills {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .nav-pills a {
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(168,200,90,0.08);
    border: 1px solid rgba(168,200,90,0.22);
    color: var(--green-300);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .nav-pills a:hover {
    background: var(--green-700);
    color: var(--ink-050);
  }
</style>
</head>
<body>
  <div class="bg-field"></div>
  <div class="wrap">
    <a class="cover-frame" href="https://agenciaexittus.github.io/agenciaexittus/" aria-label="Acessar o site da Agência Exittus" target="_blank" rel="noopener">
      <img src="https://i.ibb.co/75Ffgrg/capa-exittus-1.png" alt="Agência Exittus — Conectando talentos ao futuro">
    </a>
    <div class="actions">
      <a class="cta" href="https://agenciaexittus.github.io/agenciaexittus/" target="_blank" rel="noopener">Acessar o site →</a>
      <p class="hint">Você será redirecionado automaticamente em instantes, ou <a href="https://agenciaexittus.github.io/agenciaexittus/" target="_blank" rel="noopener">clique aqui</a>.</p>
      <div class="nav-pills">
        <a href="galeria.html" target="_blank" rel="noopener">Galeria</a>
        <a href="arquivos/redes.html" target="_blank" rel="noopener">Contatos &amp; Redes</a>
      </div>
    </div>
  </div>
</body>
</html>
